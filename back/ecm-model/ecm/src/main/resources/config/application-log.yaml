#个性化调整日志输出内容用以覆盖logback 配置####################
logging:
  config: classpath:config/logback-spring.xml
  level:
    org.springframework: error
    org.springframework.boot.web.embedded.tomcat: info
    org.springframework.context: error
    #打印暴露的请求路由日志
    _org.springframework.web.servlet.HandlerMapping: error
    springfox.documentation: error
    org.mybatis.spring: error
    com.baomidou.mybatisplus: error
    com.zaxxer.hikari: error
    org.apache: error
    org.hibernate.validator.internal: error
    io.netty: error
    sun.net.www.protocol.http.HttpURLConnection: error
    com.netflix.config.sources: error
    # quartz 日志
    org.quartz: error
    #redis
    io.lettuce.core: error
    #解密日志
    com.ulisesbocchio.jasyptspringboot: error
    jdk.event.security: error
    #alibaba################
    com.alibaba.spring: error
    com.alibaba.spring.util.BeanRegistrar: error
    #nacos-client-------心跳
    com.alibaba.nacos.client: error
    com.alibaba.nacos.common: error
    com.alibaba.nacos.shaded: error
    com.alibaba.nacos.plugin: error
    #other
    unknown.jul.logger: error
    org.reflections.Reflections: error
    #flowable
    org.flowable: error
    liquibase: error
    #pagehelper logo
    com.github.pagehelper.PageInterceptor: error
    #tlog
    com.yomahub.tlog: error
    #openFegin
    feign.template.Template: error
  file:
    path: /home/logs/sunecm/
    name: ${logging.file.path}${spring.application.name}_all.log
tlog:
  pattern: "$preApp-->$preIp-->$traceId-->$spanId"