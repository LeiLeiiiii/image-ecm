  #     8.setAwaitTerminationSeconds 设置线程池中任务的等待时间，如果超过这个时候还没有销毁就强制销毁，以确保应用最后能够被关闭，而不是阻塞住。
  corePoolSize: 10
  maxPoolSize: 15
  queueCapacity: 100
  keepAliveSeconds: 60
  threadNamePrefix: "taskExecutor-"
  awaitTerminationSeconds: 600
