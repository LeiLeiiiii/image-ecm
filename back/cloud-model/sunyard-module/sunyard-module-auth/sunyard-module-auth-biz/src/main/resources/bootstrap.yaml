server:
  port: 28081
  tomcat:
    threads:
      max: 800                # 最大工作线程数，建议CPU核心数*200%
      min-spare: 100          # 最小空闲线程，避免频繁创建销毁
    accept-count: 1000        # 等待队列长度，超过则拒绝连接
    max-connections: 10000    # 最大连接数，根据服务器性能调整
    connection-timeout: 20000 # 连接超时时间，单位毫秒
spring:
  application:
    name: auth-service

  profiles:
    active: @profiles.active@
    include: log,feign,lb,monitor,auth
