#数据库连接配置
#druid
spring:
  redis:
    database: 0
    host: 172.1.3.102
    port: 6379
    password: "123456"
    #自制redis分布式锁最长有效时间
    max-lock-time: 180
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      # 下面为连接池的补充设置，应用到上面所有数据源中
      # 初始化大小，最小，最大
      initial-size: 10
      min-idle: 20
      max-active: 100
      # 配置获取连接等待超时的时间
      max-wait: 60000
      connectTimeout: 600000
      socketTimeout: 600000
      # 每60秒运行一次空闲连接回收器
      time-between-eviction-runs-millis: 60000
      # 配置一个连接在池中最小生存的时间，单位是毫秒
      min-evictable-idle-time-millis: 300000
      # 指明连接是否被空闲连接回收器(如果有)进行检验.如果检测失败,则连接将被从池中去除.
      test-while-idle: true
      # 建议配置为false。获取连接时执行validationQuery检测连接是否有效，这个配置会降低性能。
      test-on-borrow: false
      # 建议配置为false。获取连接时执行validationQuery检测连接是否有效，这个配置会降低性能。
      test-on-return: false
      # 打开PSCache，并且指定每个连接上PSCache的大小
      pool-prepared-statements: true
      # 验证连接是否可用，使用的SQL语句
      validation-query: SELECT 1
      #   配置监控统计拦截的filters，去掉后监控界面sql无法统计，'wall用于防火墙
      max-pool-prepared-statement-per-connection-size: 20
      # 通过connectProperties属性来打开mergeSql功能；慢SQL记录
      connect-properties:
        druid.stat.mergeSql: true
        druid.stat.slowSqlMillis: 2000
      # 合并多个DruidDataSource的监控数据
      use-global-data-source-stat: true
      # 监控过滤器  可视化页面地址:  http://localhost:8085/druid/login.html
      webStatFilter:
        #  是否开启监控
        enabled: true
      # 提供监控信息展示的html页面;提供监控信息的JSON API
      statViewServlet:
        enabled: true
        # 设置白名单，不填则允许所有访问
        allow:
        #  监控路径
        url-pattern: /druid/*
        # 控制台管理用户名和密码
        login-username: admin
        login-password: sunyard
      # 慢sql记录
      filter:
        stat:
          enabled: true # 开启DruidDataSource状态监控
          log-slow-sql: true # 开启慢SQL记录功能,启用后如果遇到执行很慢的 SQL，便会输出到日志中，
          slow-sql-millis: 1000  # 默认3000毫秒，这里超过5s，就是慢，记录到日志
          merge-sql: true
        # 防御SQL注入
        wall:
          config:
            multi-statement-allow: true
    dynamic:
      primary: EDMDataSource #设置默认的数据源或者数据源组,默认值即为master
      datasource:
        EDMDataSource: # ecm服务数据源
          url: "jdbc:mysql://172.1.4.213:3306/dev_edm?useSSL=false&useUnicode=true&characterEncoding=utf-8&autoReconnect=true&serverTimezone=Asia/Shanghai&nullCatalogMeansCurrent=true&createDatabaseIfNotExist=true&allowMultiQueries=true&socketTimeout=60000&rewriteBatchedStatements=true"
          username: "root"
          password: "123456"
          driver-class-name: com.mysql.cj.jdbc.Driver
          type: com.alibaba.druid.pool.DruidDataSource
          druid:
            initial-size: 10 #连接池初始化大小
            min-idle: 20 #最小空闲连接数
            max-active: 100 #最大连接数
            connectTimeout: 600000
            socketTimeout: 600000
        ECMDataSource: # ecm服务数据源
          url: "jdbc:mysql://172.1.4.213:3306/dev_ecm?useSSL=false&useUnicode=true&characterEncoding=utf-8&autoReconnect=true&serverTimezone=Asia/Shanghai&nullCatalogMeansCurrent=true&createDatabaseIfNotExist=true&allowMultiQueries=true&socketTimeout=60000&rewriteBatchedStatements=true"
          username: "root"
          password: "123456"
          driver-class-name: com.mysql.cj.jdbc.Driver
          type: com.alibaba.druid.pool.DruidDataSource
          druid:
            initial-size: 10 #连接池初始化大小
            min-idle: 20 #最小空闲连接数
            max-active: 100 #最大连接数
            connectTimeout: 600000
            socketTimeout: 600000
        storageDataSource: # 存储服务数据源
          url: "jdbc:mysql://172.1.4.213:3306/dev_sunyard_storage?useSSL=false&useUnicode=true&characterEncoding=utf-8&autoReconnect=true&serverTimezone=Asia/Shanghai&nullCatalogMeansCurrent=true&createDatabaseIfNotExist=true&rewriteBatchedStatements=true"
          username: "root"
          password: "123456"
          driver-class-name: com.mysql.cj.jdbc.Driver
          type: com.alibaba.druid.pool.DruidDataSource
          druid:
            initial-size: 10 #连接池初始化大小
            min-idle: 20 #最小空闲连接数
            max-active: 100 #最大连接数
            connectTimeout: 600000
            socketTimeout: 600000
        systemDataSource: # 系统服务数据源
          url: "jdbc:mysql://172.1.4.213:3306/dev_sunyard_system?useSSL=false&useUnicode=true&characterEncoding=utf-8&autoReconnect=true&serverTimezone=Asia/Shanghai&nullCatalogMeansCurrent=true&createDatabaseIfNotExist=true&socketTimeout=60000&allowMultiQueries=true&rewriteBatchedStatements=true"
          username: "root"
          password: "123456"
          driver-class-name: com.mysql.cj.jdbc.Driver
          type: com.alibaba.druid.pool.DruidDataSource
          druid:
            initial-size: 10 #连接池初始化大小
            min-idle: 20 #最小空闲连接数
            max-active: 100 #最大连接数
