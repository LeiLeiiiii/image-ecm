  config: classpath:config/logback-spring.xml
  file:
    #日志输出路径，结尾需配置/结束
    name: "D:/log/MyTool"
  #   name: /applog/dcos/migration/root
  level:
    root: info

# 文档迁移线程池配置
edm-migration:
  thread-pool:
    #迁移任务线程池配置
    migrate:
      core-pool-size: 20
      max-pool-size: 20
      queue-capacity: 10000
      keep-alive-seconds: 300

# 影像迁移线程池配置
ecm-migration:
  thread-pool:
    #影像迁移任务线程池
    migrate:
      core-pool-size: 20
      max-pool-size: 20
      queue-capacity: 10000
      keep-alive-seconds: 300
    #es线程池配置
    es:
      core-pool-size: 40
      max-pool-size: 40
      queue-capacity: 10000
      keep-alive-seconds: 120
    #文件上传线程池配置
    upload:
      core-pool-size: 40
      max-pool-size: 40
      queue-capacity: 10000
      keep-alive-seconds: 120
      #文件上传多线程任务每轮进入任务数      注意!!!: 影像迁移任务线程池(migrate)的最大线程数×每轮进入任务数<=文件上传线程池(upload)的队列数
      upload-size: 500



