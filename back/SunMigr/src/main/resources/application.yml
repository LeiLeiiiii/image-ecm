server:
  # jar包启动模式时指定端口号
  port: 8089
  servlet:
    session:
      #session超时时间,以秒为单位
      timeout: 1800
  tomcat:
    #   最大连接数
    max-connections: 8192
    #   等待队列数
    accept-count: 1000
    #   系统编码
    uri-encoding: UTF-8
    threads:
      #     处理链接的最大线程数
      max: 400
    #   post参数大小限制,单位byte 暂定50M
    max-http-form-post-size: 52428800
#-------------------------------------------------------------------------
#admin控制台配置
spring:
  application:
    name: "myTool"
  profiles:
    include: Oracle
  messages:
    encoding: UTF-8

#----------------------------------------------------------
#mybatis配置
mybatis-plus:
  mapper-locations: mapping/*Mapper.xml
  type-aliases-package: com.sunyard.mytool.entity
#mybatis-plus:
#  configuration:
##    打印执行SQL,生产环境可注释掉此项
#    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

#----------------------------------------------------------------------------
#签名校验功能配置
sign-validation:
  # 是否启动签名校验
  open: true
  # 签名加密key
  sign-key: Sunyard
  # 签名过期时间,单位毫秒
  sign-expire-time: 3600000


