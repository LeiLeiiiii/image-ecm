--- #################### 注册中心相关配置 ####################
spring:
  cloud:
    nacos:
      username: nacos
      password: nacos
      discovery:
        server-addr: 172.1.3.212:8848
        namespace: yzylocal210
        service: ${spring.application.name}
    inetutils:
      preferred-networks: 172.1.102.
--- #################### 配置中心相关配置 ####################
spring:
  cloud:
    nacos:
      username: nacos
      password: nacos
      config:
        server-addr: 172.1.3.212:8848
        namespace: yzylocal210
        file-extension: yaml
        shared-configs:
          - data-id: base.yaml
        extension-configs:
          - data-id: ${spring.application.name}.yaml
            refresh: true
--- #################### 开发日志等级调整 ####################
logging:
  level:
    root: debug
    com.alibaba.cloud.nacos.client.NacosPropertySourceBuilder: debug